
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Екипът - Ремонти</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--gold:#C9A84C;--gold-light:#E4C97E;--gold-dark:#9A7530;--green:#4CAF82;--red:#E05555;--radius:18px;}
  body{ --bg-page:#0a0a0b; --bg-widget:#1A1A1C; --bg-header-from:#0F0E0C; --bg-header-mid:#1C1A12; --bg-header-to:#221F0E; --bg-panel:#1C1C1E; --bg-msgs:#1A1A1C; --bg-bubble-bot:#1E1E20; --bg-input-row:#0E0E0F; --bg-btn:#252527; --border-widget:rgba(201,168,76,0.18); --border-bubble:rgba(255,255,255,0.06); --border-input:rgba(201,168,76,0.2); --border-panel:rgba(201,168,76,0.12); --text:#F0EDE6; --text2:#C8C4BC; --muted:#888880; --scroll-thumb:#303033; --shadow:0 28px 80px rgba(0,0,0,0.65); font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-page);min-height:100vh;}
  body.light{ --bg-page:#F0EDE6; --bg-widget:#FFFFFF; --bg-header-from:#2C2A22; --bg-header-mid:#3A3520; --bg-header-to:#2C2A22; --bg-panel:#FFF8EC; --bg-msgs:#F5F2EB; --bg-bubble-bot:#FFFFFF; --bg-input-row:#FAF8F3; --bg-btn:#F0EDE6; --border-widget:rgba(201,168,76,0.35); --border-bubble:rgba(0,0,0,0.07); --border-input:rgba(201,168,76,0.4); --border-panel:rgba(201,168,76,0.2); --text:#1A1810; --text2:#3A3628; --muted:#7A7060; --scroll-thumb:#D8D0C0; --shadow:0 28px 80px rgba(0,0,0,0.18);}

  .c-btn, .cb-item, .act-btn, .cb-confirm, .cb-skip { font-size: 15px !important; padding: 13px 14px !important; }
  .c-num { width: 30px; height: 30px; font-size: 14px !important; }
  .tb-header button, .hdr-btn { min-width: 36px; min-height: 36px; }
  #tb-input { font-size: 16px; padding: 13px; }
  #tb-send { width: 52px; height: 52px; }
  .bubble { font-size: 16px; }
  .c-desc { font-size: 13px !important; }
  .c-label { font-size: 15px !important; }

  #tb-toggle{position:fixed;bottom:28px;right:28px;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(201,168,76,0.5);z-index:9999;transition:transform .25s, opacity .25s;}
  #tb-toggle:hover{transform:scale(1.1);}
  #tb-toggle.open{opacity:0;pointer-events:none;}
  #tb-badge{position:absolute;top:-4px;right:-4px;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:bold;display:none;align-items:center;justify-content:center;}
  #tb-badge.show{display:flex;}

  #tb-widget{position:fixed;bottom:106px;right:28px;width:450px;max-width:calc(100vw - 32px);height:700px;max-height:calc(100vh - 120px);background:var(--bg-widget);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-widget);display:flex;flex-direction:column;overflow:hidden;z-index:9998;transform-origin:bottom right;transform:scale(0.85) translateY(20px);opacity:0;pointer-events:none;transition:transform .32s,opacity .26s;}
  #tb-widget.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
  #tb-panel { display: none !important; }

  @media (min-width: 601px) {
    #tb-widget.open { width: 100vw !important; height: 100vh !important; max-width: 100vw !important; max-height: 100vh !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; border-radius: 0 !important; transform: none !important; }
    .widget-body { display: flex !important; flex-direction: row !important; }
    #tb-sidebar { display: flex !important; flex-direction: column !important; width: 260px !important; }
    #tb-bottom-bar { display: none !important; }
  }
  @media (max-width: 600px) {
    #tb-widget { position: fixed !important; right:0;bottom:0;left:0;top:0; width:100% !important; height:100% !important; border-radius:0; transform-origin:center center; }
    #tb-toggle{right:16px;bottom:16px;}
    #tb-sidebar { display: none !important; }
    #tb-bottom-bar { display: block !important; }
    .tb-msgs { flex: 1; min-height: 0; }
    .bubble { font-size: 15px !important; }
    .c-btn { font-size: 15px !important; }
    #tb-input { font-size: 16px !important; }
  }

  .widget-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #tb-sidebar{display:none;width:260px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border-panel);flex-direction:column;padding:14px;gap:8px;overflow-y:auto;}
  .sb-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;}
  .sb-item{background:var(--bg-btn);border:1px solid var(--border-bubble);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:2px;position:relative;}
  .sb-item-name{font-size:11px;color:var(--text);line-height:1.3;word-break:break-word;}
  .sb-item-price{font-size:12px;font-weight:700;color:var(--gold);}
  .sb-remove{position:absolute;top:4px;right:6px;background:none;border:none;color:rgba(224,85,85,0.5);cursor:pointer;font-size:14px;line-height:1;}
  .sb-total{border-top:1px solid var(--border-panel);padding-top:8px;margin-top:4px;}
  .sb-total-lbl{font-size:10px;color:var(--muted);}
  .sb-total-val{font-size:15px;font-weight:700;color:var(--gold);}
  .sb-offer-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;}
  .sb-other-btn{background:transparent;color:var(--muted);border:1px solid var(--border-bubble);border-radius:8px;padding:7px;font-size:11px;cursor:pointer;width:100%;margin-top:4px;}
  .sb-empty{font-size:11px;color:var(--muted);text-align:center;line-height:1.5;margin-top:8px;}

  #tb-bottom-bar{display:none;background:var(--bg-panel);border-top:1px solid rgba(201,168,76,0.25);padding:6px 12px;flex-shrink:0;}
  .bb-row{display:flex;align-items:center;gap:8px;}
  .bb-chips-wrapper{flex:1;min-width:0;position:relative;}
  .bb-chips{overflow-x:auto;white-space:nowrap;display:flex;gap:6px;padding-bottom:4px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
  .bb-chips::-webkit-scrollbar{height:3px;background:rgba(255,255,255,0.1);border-radius:3px;}
  .bb-chips::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
  .bb-chips-wrapper::after{content:'→';position:absolute;top:0;right:0;bottom:4px;width:28px;background:linear-gradient(90deg, transparent, var(--bg-panel));pointer-events:none;border-radius:0 8px 8px 0;display:flex;align-items:center;justify-content:flex-end;font-size:14px;font-weight:bold;color:var(--gold);padding-right:6px;}
  .bb-chip{display:inline-block;background:var(--bg-btn);border:1px solid rgba(201,168,76,0.5);border-radius:20px;padding:5px 10px;font-size:11px;color:var(--text);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;}
  .bb-total{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;flex-shrink:0;}
  .bb-offer-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  @media (max-width: 360px){.bb-offer-btn span{display:none;}.bb-offer-btn::before{content:'📋';}.bb-offer-btn{padding:6px 10px;font-size:16px;}}
  .bb-swipe-hint{font-size:9px;color:var(--gold);text-align:center;padding:2px 0 0;animation:fadeOut 5s forwards;opacity:1;}
  @keyframes fadeOut{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;display:none;}}

  .flash-confirm{background:rgba(76,175,130,0.12);border:1px solid rgba(76,175,130,0.35);border-radius:10px;padding:8px 12px;font-size:13px;color:#4CAF82;display:flex;align-items:center;gap:8px;width:100%;animation:flashIn .3s ease;}
  @keyframes flashIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .tb-header{background:linear-gradient(110deg,var(--bg-header-from) 0%,var(--bg-header-mid) 55%,var(--bg-header-to) 100%);flex-shrink:0;border-bottom:1px solid rgba(201,168,76,0.25);}
  .tb-header-top{display:flex;align-items:center;justify-content:space-between;padding:6px 11px 4px;gap:8px;}
  .tb-header-bot{display:flex;align-items:center;padding:4px 11px 8px;gap:8px;}
  #tb-close{display:flex;align-items:center;gap:4px;background:rgba(224,85,85,0.12);border:1px solid rgba(224,85,85,0.35);border-radius:7px;padding:0 12px;height:30px;cursor:pointer;color:#E05555;font-size:12px;font-weight:600;flex-shrink:0;}
  #tb-back{display:flex;align-items:center;gap:3px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:7px;padding:0 10px;height:32px;cursor:pointer;color:var(--gold-light);font-size:13px;font-weight:600;flex-shrink:0;opacity:0;pointer-events:none;}
  #tb-back.on{opacity:1;pointer-events:all;}
  .tb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
  .tb-title{flex:1;min-width:0;}
  .tb-title h3{font-size:13px;font-weight:700;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-title p{font-size:10px;color:rgba(201,168,76,0.55);}
  .tb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0;}
  .hdr-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .hdr-icons{display:flex;gap:6px;align-items:center;}
  #tb-offer-btn{display:none;align-items:center;gap:4px;background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.5);border-radius:7px;padding:0 8px;height:30px;cursor:pointer;color:var(--gold-light);font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap;}
  #tb-offer-btn.show{display:flex;}
  .tb-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--bg-msgs);scroll-behavior:smooth;}
  .bubble{max-width:92%;padding:12px 15px;border-radius:16px;font-size:15px;line-height:1.5;}
  .bubble.bot{background:var(--bg-bubble-bot);color:var(--text);border:1px solid var(--border-bubble);border-bottom-left-radius:5px;align-self:flex-start;}
  .bubble.user{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;font-weight:600;border-bottom-right-radius:5px;align-self:flex-end;}
  .ai-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .ai-btn { background: var(--bg-btn); border: 1px solid var(--gold); color: var(--gold); border-radius: 30px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .ai-btn:hover { background: var(--gold); color: #0E0E0F; transform: scale(1.02); }
  .ai-btn.call { background: var(--green); border-color: var(--green); color: white; }
  .choices{display:flex;flex-direction:column;gap:8px;width:100%;}
  .c-btn{background:var(--bg-btn);color:var(--text);border:1px solid var(--border-input);border-radius:12px;padding:12px 15px;font-size:15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;}
  .c-btn:hover{background:rgba(201,168,76,0.1);border-color:var(--gold);transform:translateX(4px);}
  .c-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .c-body{flex:1;}
  .c-label{font-size:15px;font-weight:500;}
  .c-price{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;}
  .c-desc{font-size:12px;color:var(--muted);margin-top:3px;}
  .cb-wrap{display:flex;flex-direction:column;gap:6px;}
  .cb-section{background:var(--bg-bubble-bot);border:1px solid var(--border-bubble);border-radius:14px;padding:10px 12px;width:100%;}
  .cb-section-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,0.15);}
  .cb-item{background:var(--bg-btn);border:1px solid var(--border-input);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;}
  .cb-item.checked{background:rgba(76,175,130,0.1);border-color:rgba(76,175,130,0.5);}
  .cb-box{width:22px;height:22px;border-radius:5px;border:2px solid rgba(201,168,76,0.5);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
  .cb-item.checked .cb-box{background:var(--green);border-color:var(--green);color:white;}
  .cb-body{flex:1;min-width:0;}
  .cb-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .cb-add-btn{font-size:10px;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);border-radius:14px;padding:2px 8px;flex-shrink:0;white-space:nowrap;pointer-events:none;}
  .cb-item.checked .cb-add-btn{background:var(--green);border-color:var(--green);color:#fff;}
  .cb-label{font-size:13px;font-weight:500;color:var(--text);}
  .cb-price{font-size:11px;font-weight:700;color:var(--gold);}
  .cb-sdesc{font-size:11px;color:var(--muted);}
  .cb-confirm,.cb-skip{margin-top:6px;padding:10px;border-radius:10px;font-size:13px;font-weight:bold;border:none;cursor:pointer;width:100%;}
  .cb-confirm{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;}
  .cb-skip{background:transparent;color:var(--muted);border:1px solid var(--border-bubble);}
  .cb-hint{font-size:11px;color:var(--gold);background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:6px 10px;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
  .ne-znam-hint{color:#E05555;font-weight:600;}
  .typing{display:flex;gap:5px;padding:10px 15px;background:var(--bg-bubble-bot);border:1px solid var(--border-bubble);border-radius:16px;width:fit-content;}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:tdot 1.2s infinite;}
  @keyframes tdot{0%,80%,100%{transform:scale(.7);opacity:.4;}40%{transform:scale(1);opacity:1;}}
  .tb-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border-bubble);background:var(--bg-input-row);}
  #tb-input{flex:1;background:var(--bg-btn);border:1px solid var(--border-input);border-radius:12px;padding:12px 15px;color:var(--text);font-size:16px;outline:none;}
  #tb-input:focus{border-color:var(--gold);}
  #tb-send{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;}
  .action-btns{display:flex;gap:5px;padding:5px 8px 6px;background:var(--bg-input-row);}
  .act-btn{flex:1;padding:6px 3px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;}
  .act-pdf{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;}
  .act-viber{background:linear-gradient(135deg,#7360F2,#5A4BD1);color:#fff;}
  .act-new{background:var(--bg-btn);color:var(--muted);border:1px solid var(--border-bubble);}
  .call-btn{background:var(--green);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:4px;}
  .contact-form{background:var(--bg-btn);border:1px solid var(--border-input);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .contact-form input{background:var(--bg-msgs);border:1px solid var(--border-input);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;outline:none;width:100%;}
  .contact-form input:focus{border-color:var(--gold);}
  .contact-form input::placeholder{color:var(--muted);}
  .cf-submit{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
  .cf-skip{background:transparent;color:var(--muted);border:none;font-size:13px;cursor:pointer;padding:4px;text-align:center;}

  /* Offer summary styles */
  .offer-summary-container{display:flex;flex-direction:column;gap:0;}
  .offer-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:0.5px;}
  .offer-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .offer-row{display:flex;align-items:flex-start;gap:8px;background:var(--bg-btn);border:1px solid var(--border-bubble);border-radius:10px;padding:8px 10px;}
  .offer-num{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0E0E0F;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .offer-details{flex:1;min-width:0;}
  .offer-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
  .offer-meta{font-size:10px;color:var(--muted);margin-top:2px;}
  .offer-prices{text-align:right;flex-shrink:0;}
  .offer-price-eur{font-size:13px;font-weight:700;color:var(--gold);}
  .offer-price-lv{font-size:10px;color:var(--muted);}
  .offer-total{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:10px 12px;margin-bottom:6px;}
  .offer-total span{font-size:13px;font-weight:700;color:var(--gold);}
  .total-eur{font-size:16px;font-weight:700;color:var(--gold);text-align:right;}
  .total-lv{font-size:11px;color:var(--muted);text-align:right;}
  .offer-note{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:6px;}

  /* ── FULLSCREEN OFFER OVERLAY ── */
  #offer-overlay{position:fixed;inset:0;z-index:999999;background:#0E0D0B;display:flex;flex-direction:column;transform:translateY(100%);opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s;}
  #offer-overlay.open{transform:translateY(0);opacity:1;pointer-events:all;}
  .ov-header{background:linear-gradient(110deg,#0F0E0C 0%,#1C1A12 55%,#221F0E 100%);border-bottom:2px solid rgba(201,168,76,0.3);padding:14px 16px 12px;flex-shrink:0;}
  .ov-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .ov-logo{font-family:Georgia,serif;font-size:17px;color:#C9A84C;letter-spacing:1px;}
  .ov-logo-sub{font-size:9px;color:rgba(201,168,76,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .ov-back{display:flex;align-items:center;gap:6px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:8px 14px;color:#E4C97E;font-size:13px;font-weight:700;cursor:pointer;}
  .ov-meta{display:flex;gap:12px;font-size:10px;color:rgba(201,168,76,0.4);}
  .ov-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
  .ov-section-lbl{font-size:10px;font-weight:700;color:rgba(201,168,76,0.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .ov-труд-badge{display:inline-block;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:4px 12px;font-size:10px;color:rgba(201,168,76,0.65);font-style:italic;margin-bottom:14px;}
  .ov-item{background:#1A1A1C;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:10px;}
  .ov-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .ov-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#9A7530);color:#0E0E0F;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

<script>
const EUR = 1.95583;
function eur(lv){ return (lv/EUR).toFixed(2); }
function fmt(lv){ return eur(lv)+' € / '+Number(lv).toFixed(2)+' лв'; }
function fmtU(lv,u){ return eur(lv)+' €/'+u+' · '+Number(lv).toFixed(2)+' лв/'+u; }
function pTag(lv,u){ return eur(lv)+' €/'+u+'<br>'+Number(lv)+' лв/'+u; }

const PRICES = {
  ceiling_flat:29.34, ceiling_led:50.85,
  gk_pre:27.38, gk_wall2:48.90,
  putty_fuge:8, putty_fina:10.76,
  putty_basic:16, putty_gypsum:12,
  paint_white:8.21, paint_walls_ceilings:9.39, paint_premium:13.30,
  window_lm:15,
  vik_mixer:35.20, vik_toilet:97.79, vik_siphon:29.34, vik_pipes:29.34,
  sanding:4, primer:2
};
const P = PRICES;

const elPanel = document.getElementById('tb-panel');
const elPanelItems = document.getElementById('panel-items');
const elPanelCount = document.getElementById('panel-count');
const elPanelTotal = document.getElementById('panel-total');
const elBadge = document.getElementById('tb-badge');
const elActionBtns = document.getElementById('action-btns');
const elWidget = document.getElementById('tb-widget');
const elToggle = document.getElementById('tb-toggle');
const elMsgs = document.getElementById('tb-msgs');
const elInp = document.getElementById('tb-input');
const elSend = document.getElementById('tb-send');
const elBack = document.getElementById('tb-back');
const elInputRow = document.querySelector('.tb-input-row');
const elOfferBtn = document.getElementById('tb-offer-btn');

let panelItems = [], idSeq = 0;
let isUserScrolledUp = false;
let swipeHintShown = false;

function renderPanel(){
  elPanelItems.innerHTML = '';
  let total = 0;
  panelItems.forEach(it => { total += it.total; });
  elPanelTotal.innerHTML = total > 0 ? `${eur(total)} € / ${total.toFixed(2)} лв` : '—';
  elPanelCount.textContent = panelItems.length;
  elBadge.textContent = panelItems.length;
  elBadge.classList.toggle('show', panelItems.length > 0);
  elOfferBtn.classList.toggle('show', panelItems.length > 0);

  const sbItems = document.getElementById('sb-items');
  const sbEmpty = document.getElementById('sb-empty');
  const sbFooter = document.getElementById('sb-footer');
  const sbTotal = document.getElementById('sb-total');
  if(sbItems){
    sbItems.innerHTML = '';
    if(panelItems.length === 0){
      sbEmpty.style.display = 'block';
      sbFooter.style.display = 'none';
    } else {
      sbEmpty.style.display = 'none';
      sbFooter.style.display = 'block';
      panelItems.forEach(it => {
        const d = document.createElement('div'); d.className = 'sb-item';
        d.innerHTML = `<span class="sb-item-name">${it.label}</span>
                       <div style="display:flex;align-items:center;gap:4px;margin-top:3px;">
                         <span class="sb-item-price">${it.qty} ${it.unit} × ${eur(it.price)} € = ${eur(it.total)} €</span>
                       </div>
                       <div style="display:flex;gap:4px;margin-top:5px;">
                         <button class="sb-edit-qty" data-id="${it.id}" style="flex:1;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:4px;font-size:11px;color:var(--gold);cursor:pointer;">✏️ Промени кол.</button>
                         <button class="sb-remove" data-id="${it.id}" style="background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);border-radius:6px;padding:4px 8px;font-size:12px;color:#E05555;cursor:pointer;">✕</button>
                       </div>`;
        sbItems.appendChild(d);
      });
      sbTotal.textContent = `${eur(total)} € / ${total.toFixed(2)} лв`;
      document.querySelectorAll('.sb-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          panelItems = panelItems.filter(x => x.id !== parseInt(btn.dataset.id));
          renderPanel();
        });
      });
      document.querySelectorAll('.sb-edit-qty').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = panelItems.find(x => x.id === parseInt(btn.dataset.id));
          if(!item) return;
          const newQty = prompt(`Нова стойност за "${item.label}" (${item.unit}):`, item.qty);
          if(newQty === null) return;
          const n = parseNum(newQty);
          if(!n){ alert('Невалидна стойност.'); return; }
          item.qty = n; item.total = Math.round(n * item.price * 100) / 100;
          renderPanel();
        });
      });
    }
  }

  const bbChips = document.getElementById('bb-chips');
  const bbTotal = document.getElementById('bb-total');
  const bbOfferBtn = document.getElementById('bb-offer-btn');
  const bbSwipeHint = document.getElementById('bb-swipe-hint');
  if(bbChips){
    if(panelItems.length === 0){
      bbChips.innerHTML = '<span class="bb-chip" style="background:transparent;border:none;color:var(--muted);">Няма избрани услуги</span>';
      if(bbTotal) bbTotal.textContent = '';
      if(bbOfferBtn) bbOfferBtn.style.display = 'none';
      const bbClearBtn = document.getElementById('bb-clear-btn');
      if(bbClearBtn) bbClearBtn.style.display = 'none';
      if(bbSwipeHint) bbSwipeHint.style.display = 'none';
    } else {
      bbChips.innerHTML = panelItems.map(it => `<span class="bb-chip" title="${it.label}">${it.label} ${it.qty}${it.unit}</span>`).join('');
      if(bbTotal) bbTotal.textContent = `${eur(total)} €`;
      if(bbOfferBtn) bbOfferBtn.style.display = 'block';
      const bbClearBtn2 = document.getElementById('bb-clear-btn');
      if(bbClearBtn2) bbClearBtn2.style.display = 'block';
      if(!swipeHintShown && panelItems.length >= 2){
        swipeHintShown = true;
        if(bbSwipeHint) bbSwipeHint.style.display = 'block';
        setTimeout(() => { if(bbSwipeHint) bbSwipeHint.style.display = 'none'; }, 5000);
      }
    }
  }
}

function isDuplicate(serviceName, serviceType, unit){
  return panelItems.some(p => {
    const sameService = p.label.includes(serviceName) || p.label === serviceName;
    const sameType = serviceType ? p.label.includes(serviceType) : true;
    const sameUnit = p.unit === unit;
    return sameService && sameType && sameUnit;
  });
}

function addToPanel(label, qty, unit, price){
  // Fix 1+21: проверка за дублиране
  if(panelItems.some(p => p.label === label && p.unit === unit)){
    showFlashConfirm(`${label} — вече е добавено`);
    return;
  }
  panelItems.push({ id: ++idSeq, label, qty, unit, price, total: qty * price });
  renderPanel();
  showFlashConfirm(`${label} — ${eur(qty*price)} €`);
}

function showFlashConfirm(text){
  const prev = elMsgs.querySelector('.flash-confirm');
  if(prev) prev.remove();
  const flash = document.createElement('div');
  flash.className = 'flash-confirm bubble bot';
  flash.style.cssText = 'background:rgba(76,175,130,0.12);border:1px solid rgba(76,175,130,0.35);color:#4CAF82;display:flex;align-items:center;gap:8px;';
  flash.innerHTML = `<span style="font-size:16px;">✅</span><span>Добавено: ${text}</span>`;
  elMsgs.appendChild(flash);
  setTimeout(() => { if(flash.parentNode) flash.style.opacity='0'; setTimeout(() => { if(flash.parentNode) flash.remove(); }, 400); }, 3000);
}

function clearPanel(){ panelItems = []; renderPanel(); }

function checkIfScrolledUp(){
  if(!elMsgs) return;
  const distanceFromBottom = elMsgs.scrollHeight - elMsgs.scrollTop - elMsgs.clientHeight;
  isUserScrolledUp = distanceFromBottom > 80;
}
let _skipScroll = false;
function skipScrollFor(ms){ _skipScroll = true; setTimeout(() => { _skipScroll = false; }, ms || 500); }

function smartScrollToBottom(force = false){
  if(!elMsgs) return;
  if(_skipScroll) return;
  if(force) isUserScrolledUp = false;
  if(!isUserScrolledUp){
    requestAnimationFrame(() => {
      elMsgs.scrollTo({ top: elMsgs.scrollHeight, behavior: 'smooth' });
    });
  }
}

function scrollEnd(){ smartScrollToBottom(); }
function scrollToLast(){ smartScrollToBottom(); }

function sanitize(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function addBubble(html, who, clickable = false, callback = null){
  const d = document.createElement('div'); d.className = `bubble ${who}`;
  // XSS защита: потребителски bubble-и се sanitize-ват
  d.innerHTML = who === 'user' ? sanitize(html) : html;
  if(clickable){
    d.style.cursor = 'pointer';
    d.addEventListener('click', () => { if(callback) callback(); else bubbleBack(d); });
  }
  elMsgs.appendChild(d);
  smartScrollToBottom();
  return d;
}

function newQuestionOnly(){
  clearCho(); setInp(true, 'Напишете въпроса си...');
  elMsgs.innerHTML = '';
  addBubble('💬 Задайте нов въпрос:', 'bot');
}

function addFallbackResponse(text){
  // Махаме бутоните от всички предишни fallback отговори
  elMsgs.querySelectorAll('.fb-actions').forEach(el => el.remove());
  const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'bubble bot';
  bubbleDiv.innerHTML = `<div style="font-size:14px;line-height:1.55;">${text}</div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-bubble);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <button class="call-btn" onclick="window.location.href='tel:0877810418'" style="font-size:13px;">📞 0877 810 418</button>
    </div>
    <div class="ai-actions fb-actions">
      <button class="ai-btn fb-new-question">💬 Друг въпрос</button>
      <button class="ai-btn fb-menu">🏠 Към менюто</button>
    </div>`;
  elMsgs.appendChild(bubbleDiv);
  bubbleDiv.querySelector('.fb-new-question').addEventListener('click', () => {
    elMsgs.querySelectorAll('.fb-actions').forEach(el => el.remove());
    setInp(true, 'Вашият въпрос…');
    addBubble('💬 Задайте нов въпрос:', 'bot');
  });
  bubbleDiv.querySelector('.fb-menu').addEventListener('click', () => { clearCho(); setInp(false,''); go('start'); });
  smartScrollToBottom();
  setInp(true, 'Напишете нов въпрос...');
}

function showTyping(){
  const e = document.createElement('div'); e.className = 'typing'; e.id = 'tb-typ';
  e.innerHTML = '<span></span><span></span><span></span>';
  elMsgs.appendChild(e);
  smartScrollToBottom();
}
function hideTyping(){ const e = document.getElementById('tb-typ'); if(e) e.remove(); }
let choEl = null;
function clearCho(){ if(choEl && choEl.remove) choEl.remove(); choEl = null; }
function setInp(on, ph){
  elInp.disabled = !on; elSend.disabled = !on;
  if(ph !== undefined) elInp.placeholder = ph;
  if(on) setTimeout(() => elInp.focus(), 80);
}

function calcMsg(c, unit){
  if(!c.price || isNaN(c.price)) return '<span style="color:var(--red)">⚠️ Грешка в цената. Моля, започнете отначало.</span>';
  const lv = c.value * c.price, e = eur(lv);
  return `<span style="font-size:20px;font-weight:700;color:var(--gold);">${e} € / ${lv.toFixed(2)} лв</span>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">${c.serviceName||''} · ${c.serviceType||''} · ${c.value} ${unit} × ${eur(c.price)} €/${unit}</div>
          <div style="font-size:11px;color:rgba(201,168,76,0.7);margin-top:3px;font-style:italic;">⚠️ Само за труд — без материали</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">📐 Ориентировъчна цена.</div>`;
}

function parseNum(val){
  // Приема и точка и запетая като десетичен разделител
  const n = parseFloat(String(val).replace(',','.'));
  if(isNaN(n) || n <= 0) return null;
  // Закръгляме до 2 знака след запетаята
  return Math.round(n * 100) / 100;
}

function smartFallback(question) {
  const q = question.toLowerCase();
  // Срокове
  if (/срок|колко дни|колко време|кога ще|бързо|спешно/i.test(q))
    return { text: 'Сроковете зависят от вида и обема на работа и се определят след оглед на обекта. Работим организирано и спазваме договорените срокове — без изненади.' };
  // Гаранция
  if (/гаранц/i.test(q))
    return { text: 'Даваме гаранция на всички изпълнени дейности. Условията се уточняват при огледа и се записват в договора.' };
  // Материали
  if (/материал|осигур|снабд/i.test(q))
    return { text: 'Работим и с двата варианта — материали от нас или от клиента. Всички цени в бота са само за труд, без материали.' };
  // Плащане
  if (/плащ|аванс|депозит|как се плаща|брой|банк/i.test(q))
    return { text: 'Плащането се договаря индивидуално — обикновено аванс и финално плащане след завършване. Никакви скрити такси.' };
  // Локация
  if (/работит|покриват|район|квартал|град|sofia|софия|варна|пловдив|къде|идват|елате|дойдете|до нас|при нас|обслужват|покривате/i.test(q))
    return { text: 'Работим основно в София и околността. Обадете се на 0877 810 418 и ще уточним дали покриваме вашия район.' };
  // Оглед
  if (/оглед|замер|дойд|елате|безплатен/i.test(q))
    return { text: 'Огледът е напълно безплатен и без ангажимент. Обадете се и уговаряме удобен час.' };
  // Опит / доверие
  if (/опит|години|референц|препорък|доверие|снимк|работа ви|виж|покаж/i.test(q))
    return { text: 'Зад нас стоят години опит и доволни клиенти. Пишете ни в Viber на 0877 810 418 и ще ви изпратим снимки от изпълнени обекти.' };
  // Квадратура
  if (/квадратура|кв|м²|колко метра|площ/i.test(q))

const MAX_MSG_PER_MINUTE = 30;
function canSendMessage(){
  const now = Date.now();
  msgTimestamps = msgTimestamps.filter(t => now - t < 60000);

// Разпознава дали клиентът знае точно какво мери (стена/таван) или е объркан
function parseAreaInput(val, norm){
  const lower = norm.toLowerCase();
  // Знае точно — стена или таван
  const knowsWhat = /стена|стени|stena|steni|таван|tavan|тавана|tavana|прозорец|прозорци|дограма|линеин|л\.м|лм/i.test(lower);
  // Объркан — дава стая/апартамент/жилище
  const confused = /стая|стаята|апартамент|apartment|apartament|жилище|имот|staya|квадрат на стая/i.test(lower);
  // Число в текста
  const numMatch = lower.match(/\b(\d+(?:[.,]\d+)?)\b/);
  const num = numMatch ? parseFloat(numMatch[1].replace(',','.')) : null;

  if(knowsWhat && num && num > 0) return { type:'direct', value: num };
  if(confused) return { type:'explain', value: num };
  return null;
}

function bubbleBack(el){
  if(_backBusy) return;
  const nodes = Array.from(elMsgs.children), idx = nodes.indexOf(el);
  if(idx < 0) return;
  let si = -1;
  for(let i=hist.length-1; i>=0; i--) if(hist[i].dom <= idx){ si=i; break; }
  if(si < 0){ goBack(); return; }
  _backBusy = true;
  setTimeout(() => { _backBusy = false; }, 600);
  const snap = hist[si]; hist = hist.slice(0, si); restoreSnap(snap);
  clearCho(); setInp(false, '');
  elInputRow.style.display = 'flex';
  while(elMsgs.children.length > idx+1) elMsgs.removeChild(elMsgs.lastChild);
  const def = S[cur];

function processQueue(){
  if(!cbQueue.length){ ctx.queueArea = null; go('offer_summary'); return; }
  const item = cbQueue.shift();
  ctx.price = item.price; ctx.serviceName = item.serviceName; ctx.serviceType = item.serviceType; ctx.displayUnit = item.displayUnit || 'м²';
  const unitsMismatch = ctx.prevUnit && ctx.prevUnit !== ctx.displayUnit;
  if(unitsMismatch){
    ctx.queueArea = null;
    setInp(true, `Въведете ${ctx.displayUnit}…`);
    ctx._queueAwaitingArea = true;
  } else if(ctx.queueArea){
    ctx.value = ctx.queueArea; goDirectResult(item);
  } else if(ctx.prevValue && ctx.prevUnit === ctx.displayUnit){
    go('confirm_area_once');
  } else {
    go('confirm_area_once');
  }
}

function goDirectResult(item){

}

async function onCho(c){
  clearCho();
  if(c.reset){ fullReset(); return; }
  if(c.specialCall){ window.location.href = 'tel:0877810418'; return; }
  if(c.next === '_queue_same'){ addBubble(c.label, 'user', false); ctx.queueArea = ctx.prevValue; processQueue(); return; }
  if(c.next === '_queue_new'){ addBubble(c.label, 'user', false); setInp(true, 'Въведете квадратура (м²)…'); ctx._queueAwaitingArea = true; return; }
  addBubble(c.label, 'user', false);
  if(c.price !== undefined) ctx.price = c.price;
  if(c.serviceName !== undefined) ctx.serviceName = c.serviceName;
  if(c.serviceType !== undefined) ctx.serviceType = c.serviceType;
  if(c.displayUnit !== undefined) ctx.displayUnit = c.displayUnit;
  if(c.confirmNext !== undefined) ctx.confirmNext = c.confirmNext;
  if(c.sameArea && ctx.prevValue){
    const target = ctx.confirmNext, isMenu = target && target.indexOf('_menu') !== -1;
    if(isMenu){ ctx.usesPrevArea = true; setTimeout(() => go(target), 380); }
    else{ ctx.value = ctx.prevValue; ctx.displayUnit = ctx.prevUnit || 'м²'; setTimeout(() => go(target.replace(/_area(_manual)?$/, '_result')), 380); }
    return;
  }
  setTimeout(() => go(c.next), 380);
}

function go(name){
  const def = S[name]; if(!def){ console.warn('Missing state:', name); return; }
  if(cur === 'offer_summary'){ elInputRow.style.display = 'flex'; elActionBtns.style.display = 'none'; }
  if(def.input === 'number' && ctx.usesPrevArea && ctx.prevValue){
    const targetUnit = def.displayUnit || 'м²';
    if(ctx.prevUnit && ctx.prevUnit !== targetUnit){
      ctx.usesPrevArea = false;
    } else {
      ctx.value = ctx.prevValue; ctx.displayUnit = ctx.prevUnit || 'м²'; ctx.usesPrevArea = false;
      pushHist(); cur = name; showTyping();
      setTimeout(() => { hideTyping(); addBubble(def.msg(ctx), 'bot', true); setTimeout(() => go(def.next), 480); }, 300);
      return;
    }
  }
  if(def.displayUnit && !ctx.displayUnit) ctx.displayUnit = def.displayUnit;
  if(def.save && ctx.value && ctx.price){
    const unit = ctx.displayUnit || def.save.unit || 'м²';
    const label = def.save.pre + (ctx.serviceType ? ` (${ctx.serviceType})` : '');
    addToPanel(label, ctx.value, unit, ctx.price);
    if(def.save.last){ ctx.lastService = def.save.last; ctx.prevValue = ctx.value; ctx.prevUnit = unit; }
  }
  pushHist(); cur = name;
  updateBackBtn();
  // Ако state-ът ще показва choices/checkboxes/grid → блокираме scroll веднага
  if(def.choices || def.choicesFn || def.checkboxesFn || def.onEnter){
    skipScrollFor(800);
  }
  showTyping();
  setTimeout(async () => {
    hideTyping();
    let msgHtml = typeof def.msg === 'function' ? def.msg(ctx) : def.msg;
    const newBubble = addBubble(msgHtml, 'bot', true);
    if(!def.choices && !def.choicesFn && !def.checkboxesFn && !def.onEnter){
      setTimeout(() => newBubble.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
    }
    if(def.onEnter) def.onEnter();
    if(def.checkboxesFn) setTimeout(() => { renderCheckboxes(def.checkboxesFn(ctx), ctx.lastService); }, 350);
    else if(def.choicesFn) setTimeout(() => { renderCho(def.choicesFn(ctx)); }, 350);
    else if(def.choices && def.choices.length) setTimeout(() => { renderCho(def.choices); }, 350);
    else if(def.input){ setInp(true, def.label || 'Въведете…'); elInputRow.style.display = 'flex'; }
    else if(def.autoNext){ if(cbQueue.length) processQueue(); else setTimeout(() => go(def.autoNext), 400); }
  }, 300);
}

// ======================== ХИБРИДЕН AI ЗА ЦЕНИ (СКРИПТ) ========================
function extractArea(text) {
  const match = text.match(/\b(\d+(?:\.\d+)?)\s*(?:кв\.?м|kv|m2|кв|м²)/i);
  if (match) return parseFloat(match[1]);
  const match2 = text.match(/\b(\d+(?:\.\d+)?)\b/);
  if (match2 && !text.includes('цена') && !text.includes('колко')) return parseFloat(match2[1]);
  return null;
}

function isAskingForMaterials(question) {
  const q = question.toLowerCase();
  return /материал|материали|грунд.*струва|боя.*струва|латекс.*струва|цена на грунд|цена на боя|колко струва грунд|скъп ли е грунд/i.test(q);
}

function handlePriceQuestion(question, areaFromInput = null) {
  const q = question.toLowerCase();
  if (isAskingForMaterials(question)) {
    return "Цената на материала зависи от марката и магазина. За безплатен оглед и точно остойностяване се обадете на 0877 810 418.";
  }
  const isAskingPrice = /колко|цена|струва|скъпо|цената на|колко е|струват|цените|сума|изчислението/i.test(q);
  if (!isAskingPrice && areaFromInput === null) return null;

  let area = areaFromInput;
  if (area === null) area = extractArea(q);
  
  function priceResponse(pricePerUnit, serviceName) {
    if (area && area > 0) {
      const total = area * pricePerUnit;
      const totalEur = (total / 1.95583).toFixed(2);
      return `${serviceName} – ${pricePerUnit} лв/м² × ${area} м² = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `${serviceName} – ${pricePerUnit} лв/м² **само за труд** (без материали). Нужна е квадратура за точна сума.`;
    }
  }

  if (q.includes('шпакловка') || q.includes('шпак')) {
    if (q.includes('основна') || q.includes('укрепваща')) return priceResponse(16, 'Основна укрепваща шпакловка');
    if (q.includes('гипсова') || q.includes('армировка')) return priceResponse(12, 'Гипсова шпакловка с армировка');
    if (q.includes('финишна') || q.includes('огледална') || q.includes('финна')) return priceResponse(22, 'Финишна огледална шпакловка');
    return `Цените за шпакловка **само за труд** (без материали) са:
- Основна укрепваща: 16 лв/м²
- Гипсова с армировка: 12 лв/м²
- Финишна огледална: 22 лв/м²
Нужна е квадратура за изчисление.`;
  }
  if (q.includes('боядисване') || q.includes('боя')) {
    if (q.includes('бяло')) return priceResponse(9.77, 'Боядисване (бяло)');
    if (q.includes('стени')) return priceResponse(11.73, 'Боядисване (стени)');
    if (q.includes('таван')) return priceResponse(10, 'Боядисване (таван)');
    if (q.includes('премиум')) return priceResponse(14, 'Боядисване (премиум)');
    return `Цените за боядисване **само за труд** (без материали) са:
- Бяло: 9.77 лв/м²
- Стени: 11.73 лв/м²
- Таван: 10 лв/м²
- Премиум: 14 лв/м²
Нужна е квадратура.`;
  }
  if (q.includes('грунд') && !q.includes('материал')) {
    if (area) {
      const total = area * 2;
      const totalEur = (total / 1.95583).toFixed(2);
      return `Грунд (полагане) – 2 лв/м² × ${area} м² = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `Грунд (полагане) – 2 лв/м² **само за труд** (без материали). Нужна е квадратура.`;
    }
  }
  if (q.includes('шлайфане')) return priceResponse(4, 'Шлайфане');
  if (q.includes('гипсокартон')) {
    if (q.includes('стена')) return priceResponse(38, 'Гипсокартон (стена)');
    if (q.includes('предстена')) return priceResponse(42, 'Предстена');
    if (q.includes('двоен')) return priceResponse(50, 'Двоен гипсокартон');
    return `Цени за гипсокартон **само за труд**:\n- Стена: 38 лв/м²\n- Предстена: 42 лв/м²\n- Двоен: 50 лв/м²`;
  }
  if (q.includes('таван') || q.includes('окачен таван')) {
    if (q.includes('прав')) return priceResponse(45, 'Прав окачен таван');
    
    if (q.includes('led')) return `LED ниша – 90 лв/л.м. **само за труд** (без материали). Нужни са линейни метри.`;
    return `Цени за гипсокартон **само за труд**:\n- Прав таван: 29.34 лв/м²\n- LED ниша: 50.85 лв/л.м.\n- Предстенна обшивка: 27.38 лв/м²\n- Преградна стена: 48.90 лв/м²`;
  }
  if (q.includes('прозорци') || q.includes('дограма') || q.includes('обръщане')) {
    if (area) {
      const total = area * 15;
      const totalEur = (total / 1.95583).toFixed(2);
      return `Обръщане на прозорци – 15 лв/л.м. × ${area} л.м. = ${total} лв (${totalEur} €) **само за труд** (без материали).`;
    } else {
      return `Обръщане на прозорци – 15 лв/л.м. **само за труд**. Нужни са линейни метри.`;
    }
  }
  if (q.includes('вик') || q.includes('смяна на') || q.includes('смесител') || q.includes('тоалетна') || q.includes('сифон')) {
    if (q.includes('смесител')) return `Смяна на смесител – 27 лв **само за труд** (без материали).`;
    if (q.includes('тоалетна')) return `Смяна на тоалетна чиния – 27 лв **само за труд** (без материали).`;
    if (q.includes('сифон')) return `Смяна на сифон – 18 лв **само за труд** (без материали).`;
    return `ВиК услуги (само труд): смесител 27 лв, тоалетна 27 лв, сифон 18 лв. Материалите се заплащат отделно.`;
  }
  return null;
}

function handleInp(){
  const val = elInp.value.trim();
  if(!val) return;
  if(!canSendMessage()){ elInp.value = ''; return; }
  const def = S[cur];

  // ── Нормализация на латински изписвания и диалект ───────────────────
  let norm = val.toLowerCase();
  // Шпакловка
  norm = norm.replace(/shpaklovk[ai]?|shpak|6paklovk[ai]?|6paklovkata|6pak|спакловка|шпаклувка/g, 'шпакловка');
  // Боядисване / латекс
  norm = norm.replace(/boqdisvane|boyadisvane|boya|баядисване|боядисавне/g, 'боядисване');
  norm = norm.replace(/латекс|lateks|latex/g, 'боядисване');  // Гипсокартон
  norm = norm.replace(/gipsokarton|gips|гипскартон/g, 'гипсокартон');
  // Таван
  norm = norm.replace(/tavan|акачен таван/g, 'таван');
  // Прозорци
  norm = norm.replace(/prozorci|prozortsi|продорци|dograma/g, 'прозорци');
  // ВиК
  norm = norm.replace(/\bvik\b|smesitel|toaletna|sifon|trubi/g, function(m){
    const map = {vik:'вик',smesitel:'смесител',toaletna:'тоалетна',sifon:'сифон',trubi:'тръби'};
    return map[m]||m;
  });
  // Шлайфане
  norm = norm.replace(/shlayfane|shlayf|shkurene|шлайфането|шкурене/g, 'шлайфане');
  // Грунд
  norm = norm.replace(/grund|grundirane|грунта/g, 'грунд');
  // Квадратура
  norm = norm.replace(/kvadratura|kvdratura|kv\.?m|m2|кватратура|квадратурата|колко метра|колко кв/g, 'квадратура');
  norm = norm.replace(/м²|кв\.?м/g, 'квадратура');

  // ── СТЪПКА 1: Чакаме число (квадратура) – keyword routing се пропуска ──
  if(ctx._gridQueuePending){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; setInp(false,''); ctx._gridQueuePending = false; return;
    }
    const n = parseNum(val);
    if(!n){ addBubble("❌ Моля, въведете положително число (например 80) или напишете 'не знам'.", 'bot'); elInp.value=''; setTimeout(()=>elInp.focus(),80); return; }
    addBubble(val, 'user', false); elInp.value=''; setInp(false,'');
    ctx.queueArea = n; ctx.prevValue = n; ctx.prevUnit = 'м²'; ctx._gridQueuePending = false;
    processGridQueue();
    return;
  }
  if(ctx._queueAwaitingArea){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; setInp(false, ''); ctx._queueAwaitingArea = false; return;
    }
    const parsed = parseAreaInput(val, norm);
    if(parsed && parsed.type === 'explain'){
      addBubble(val, 'user', false); elInp.value = '';
      addBubble(AREA_EXPLANATION, 'bot');
      setInp(true, 'Въведете м²…'); return;
    }
    if(parsed && parsed.type === 'direct'){
      addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
      ctx.queueArea = parsed.value; ctx.prevValue = parsed.value; ctx.prevUnit = 'м²'; ctx._queueAwaitingArea = false;
      processQueue(); return;
    }
    const n = parseNum(val);
    if(!n){
      addBubble("❌ Моля, въведете число (например 25) или напишете 'не знам'.", "bot");
      elInp.value = ''; setTimeout(()=>elInp.focus(),80); return;
    }
    addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
    ctx.queueArea = n; ctx.prevValue = n; ctx.prevUnit = 'м²'; ctx._queueAwaitingArea = false;
    processQueue();
    return;
  }
  if(def && def.input === 'number'){
    const lower = norm;
    if(lower === 'не знам' || lower === 'незнам' || lower === '?' || lower === '0'){
      handleUnknownArea(); elInp.value = ''; return;
    }
    // Smart detection — стая/апартамент → обяснение, стена/таван → директно
    const parsed = parseAreaInput(val, norm);
    if(parsed && parsed.type === 'explain'){
      addBubble(val, 'user', false); elInp.value = '';
      addBubble(AREA_EXPLANATION, 'bot');
      const unit = def.displayUnit || 'м²';
      setInp(true, `Въведете ${unit}…`);
      return;
    }
    if(parsed && parsed.type === 'direct'){
      const n = parsed.value;
      ctx.value = n; ctx.prevValue = n; ctx.prevUnit = def.displayUnit || 'м²'; ctx.displayUnit = def.displayUnit || 'м²';
      addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
      if(cbQueue.length) setTimeout(processQueue, 380);
      else setTimeout(() => go(def.next), 380);
      return;
    }
    const n = parseNum(val);
    if(!n){
      addBubble("❌ Моля, въведете число (например 25). Ако не сте сигурни — напишете 'не знам'.", "bot");
      elInp.value = ''; setTimeout(()=>elInp.focus(),80); return;
    }
    ctx.value = n; ctx.prevValue = n; ctx.prevUnit = def.displayUnit || 'м²'; ctx.displayUnit = def.displayUnit || 'м²';
    addBubble(val, 'user', false); elInp.value = ''; setInp(false, '');
    if(cbQueue.length) setTimeout(processQueue, 380);
    else setTimeout(() => go(def.next), 380);
    return;
  }

  // ── СТЪПКА 2: Ценови скрипт (работи с нормализирания текст) ─────────
  const priceAnswer = handlePriceQuestion(norm);
  if(priceAnswer){
    addBubble(val, 'user', false);
    elInp.value = ''; setInp(false, '');
    addBubble(priceAnswer, 'bot');
    setInp(true, "Напишете нов въпрос...");
    return;
  }

  // ── СТЪПКА 3: Keyword routing към менюта ─────────────────────────────
  // Ако въпросът е за материали/включване/осигуряване → smartFallback, не меню
  const isMaterialQuestion = /включен|осигур|материал|от вас|купув|доставя/i.test(norm);

  const isServiceKeyword = !isMaterialQuestion && (
    norm.includes('шпакловка') || norm.includes('шпак') ||
    norm.includes('боядисване') || norm.includes('боя') ||
    norm.includes('гипсокартон') || norm.includes(' гк') || norm === 'гк' ||
    norm.includes('таван') || norm.includes('окачен') ||
    norm.includes('прозорци') || norm.includes('дограма') || norm.includes('обръщане') ||
    norm.includes('вик') || norm.includes('смесител') || norm.includes('тоалетна') || norm.includes('сифон')
  );

  if(isServiceKeyword){
    addBubble(val, 'user', false);
    elInp.value = ''; setInp(false, '');
    if(norm.includes('шпакловка') || norm.includes('шпак')){
      setTimeout(() => go('putty_menu'), 380); return;
    }
    if(norm.includes('боядисване') || norm.includes('боя')){
      setTimeout(() => go('painting_menu'), 380); return;
    }
    if(norm.includes('гипсокартон') || norm.includes(' гк') || norm === 'гк'){
      setTimeout(() => go('gk_menu'), 380); return;
    }
    if(norm.includes('таван') || norm.includes('окачен')){
      setTimeout(() => go('gk_menu'), 380); return;
    }
    if(norm.includes('прозорци') || norm.includes('дограма') || norm.includes('обръщане')){
      setTimeout(() => go('windows_menu'), 380); return;
    }
    if(norm.includes('вик') || norm.includes('смесител') || norm.includes('тоалетна') || norm.includes('сифон')){
      setTimeout(() => go('vik_menu'), 380); return;
    }
  }

  // ── СТЪПКА 4: Свободен въпрос → smartFallback ───────────────────────
  addBubble(val, 'user', false);
  elInp.value = ''; setInp(false, '');
  showTyping();
  setTimeout(() => {
    hideTyping();
    const fb = smartFallback(norm);
    addFallbackResponse(fb.text);
  }, 600);
}

  const totalLv = panelItems.reduce((s,it)=> s+it.total, 0);
  const rawDate = new Date();
  const date = rawDate.getDate() + '.' + String(rawDate.getMonth()+1).padStart(2,'0') + '.' + rawDate.getFullYear();
  const ofertaNum = String(Date.now()).slice(-4);
  const rows = panelItems.map((it,i) => `

      <td style="padding:8px 10px;border-bottom:1px solid #eee;text-align:right;font-size:10px;font-weight:700;color:#9A7530;">${eur(it.total)} €<br>${it.total.toFixed(2)} лв</td>

// ======================== GRID CHECKBOXES ========================
function renderGridCheckboxes(items, knownArea, flowKey){
  clearCho();
  // Скриваме input полето — не е нужно на тази стъпка
  elInp.disabled = true; elSend.disabled = true;
  elInputRow.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:var(--bg-bubble-bot);border:1px solid var(--border-bubble);border-radius:16px;border-top-left-radius:4px;padding:14px 14px 12px;';

  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:0.3px;';
  title.textContent = '✅ Изберете следващите стъпки:';
  wrap.appendChild(title);

  // Scroll hint ако има много items
  if(items.length > 3){
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:10px;color:var(--muted);margin-bottom:8px;text-align:center;';
    hint.textContent = '👇 Превъртете надолу за всички опции';
    wrap.appendChild(hint);
  }

  // Grid — 1 колона на мобилен, 2 на десктоп
  const grid = document.createElement('div');
  const isMobile = window.innerWidth <= 600;
  grid.style.cssText = `display:grid;grid-template-columns:${isMobile ? '1fr' : '1fr 1fr'};gap:8px;margin-bottom:14px;`;

  const checked = {};
  // Fix 44: възстановяваме предишен избор ако има
  const prevChecked = ctx._lastGridChecked || [];
  items.forEach(it => {
    if(it.locked) checked[it.id] = true;
    if(prevChecked.includes(it.id)) checked[it.id] = true;
    const isChecked = it.checked || it.locked;
    const cell = document.createElement('div');
    cell.dataset.id = it.id;
    cell.style.cssText = `
      background:${isChecked ? 'rgba(76,175,130,0.08)' : 'var(--bg-btn)'};
      border:2px solid ${isChecked ? 'rgba(76,175,130,0.6)' : 'rgba(201,168,76,0.22)'};
      border-radius:12px;padding:12px 12px 10px;
      cursor:${it.locked ? 'default' : 'pointer'};
      display:flex;align-items:center;gap:12px;
      transition:background .15s,border-color .15s;
    `;
    // Emoji
    const emojiSpan = document.createElement('span');
    emojiSpan.style.cssText = 'font-size:22px;line-height:1;flex-shrink:0;';
    emojiSpan.textContent = it.emoji;
    // Text block
    const textBlock = document.createElement('div');
    textBlock.style.cssText = 'flex:1;min-width:0;';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:14px;font-weight:700;color:var(--text);line-height:1.3;';
    lbl.textContent = it.label;
    const priceDiv = document.createElement('div');
    priceDiv.style.cssText = 'font-size:12px;font-weight:700;color:var(--gold);margin-top:3px;white-space:nowrap;';
    priceDiv.textContent = it.price ? `${eur(it.price)} € / ${it.price} лв/м²` : '🎨 избор на цвят';
    const desc = document.createElement('div');
    desc.style.cssText = 'font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3;';
    desc.textContent = it.desc;
    textBlock.appendChild(lbl); textBlock.appendChild(priceDiv); textBlock.appendChild(desc);
    // Checkbox
    const chkBox = document.createElement('div');
    chkBox.style.cssText = `
      width:26px;height:26px;border-radius:6px;flex-shrink:0;
      border:2px solid ${isChecked ? 'var(--green)' : 'rgba(201,168,76,0.45)'};
      background:${isChecked ? 'var(--green)' : 'transparent'};
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:#fff;
      transition:all .15s;
    `;
    chkBox.textContent = it.locked ? '🔒' : (isChecked ? '✓' : '');
    cell.appendChild(emojiSpan); cell.appendChild(textBlock); cell.appendChild(chkBox);
    grid.appendChild(cell);
    if(!it.locked){
      cell.addEventListener('click', () => {
        if(checked[it.id]){
          delete checked[it.id];
          cell.style.background = 'var(--bg-btn)';
          cell.style.borderColor = 'rgba(201,168,76,0.22)';
          chkBox.textContent = '';
          chkBox.style.background = 'transparent';
          chkBox.style.borderColor = 'rgba(201,168,76,0.45)';
        } else {
          checked[it.id] = true;
          cell.style.background = 'rgba(76,175,130,0.08)';
          cell.style.borderColor = 'rgba(76,175,130,0.6)';
          chkBox.textContent = '✓';
          chkBox.style.background = 'var(--green)';
          chkBox.style.borderColor = 'var(--green)';
        }
        const hasChecked = Object.keys(checked).length > 0;
        cfBtn.disabled = !hasChecked;
        cfHint.style.display = hasChecked ? 'none' : 'block';
      });
    }
  });
  wrap.appendChild(grid);

  // Area section
  const areaSection = document.createElement('div');
  if(knownArea){
    areaSection.style.cssText = 'margin-bottom:12px;';
    // Показваме текущата квадратура и само опция за промяна
    const areaInfo = document.createElement('div');
    areaInfo.style.cssText = 'background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.3);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
    areaInfo.innerHTML = `<span style="font-size:13px;color:#4CAF82;font-weight:600;">📏 Квадратура</span><span style="font-size:16px;font-weight:700;color:#4CAF82;">${knownArea} м²</span>`;
    const changeAreaBtn = document.createElement('button');
    changeAreaBtn.style.cssText = `width:100%;background:var(--bg-btn);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;`;
    changeAreaBtn.innerHTML = `<span style="font-size:13px;color:var(--gold);">✏️ Въведи различна квадратура</span>`;
    let selectedArea = knownArea;
    let areaConfirmed = true;
    const areaInputRow = document.createElement('div');
    areaInputRow.style.cssText = 'display:none;margin-top:8px;';
    const areaInput = document.createElement('input');
    areaInput.type = 'number'; areaInput.min = '1'; areaInput.placeholder = 'Въведете м²';
    areaInput.style.cssText = `width:100%;background:var(--bg-btn);border:1px solid var(--border-input);border-radius:10px;padding:12px;color:var(--text);font-size:16px;outline:none;`;
    areaInput.addEventListener('input', () => {
      const v = parseFloat(areaInput.value);
      if(v > 0){ selectedArea = v; areaConfirmed = true; }
    });
    areaInputRow.appendChild(areaInput);
    changeAreaBtn.addEventListener('click', () => {
      changeAreaBtn.style.borderColor = 'var(--gold)';
      areaInputRow.style.display = 'block';
      setTimeout(() => areaInput.focus(), 50);
    });
    areaSection.appendChild(areaInfo);
    areaSection.appendChild(changeAreaBtn);
    areaSection.appendChild(areaInputRow);
    wrap._getArea = () => ({ area: selectedArea, confirmed: areaConfirmed });
  } else {
    areaSection.style.cssText = 'margin-bottom:12px;';
    const areaLabel = document.createElement('div');
    areaLabel.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:8px;';
    areaLabel.textContent = '📏 Въведете квадратура (м²) — важи за всички избрани:';
    areaSection.appendChild(areaLabel);
    const areaInput = document.createElement('input');
    areaInput.type = 'number'; areaInput.min = '1'; areaInput.placeholder = 'напр. 25';
    areaInput.style.cssText = `width:100%;background:var(--bg-btn);border:1px solid var(--border-input);border-radius:10px;padding:12px;color:var(--text);font-size:16px;outline:none;`;
    areaSection.appendChild(areaInput);
    wrap._getArea = () => {
      const v = parseFloat(areaInput.value);
      return { area: v > 0 ? v : null, confirmed: v > 0 };
    };
  }
  wrap.appendChild(areaSection);

  const cfBtn = document.createElement('button');
  cfBtn.className = 'cb-confirm';
  cfBtn.textContent = '✅ Добави избраните';
  cfBtn.style.cssText = 'margin-top:4px;font-size:15px;padding:14px;width:100%;';
  cfBtn.disabled = true;
  const cfHint = document.createElement('div');
  cfHint.style.cssText = 'font-size:11px;color:var(--muted);text-align:center;margin-top:5px;';
  cfHint.textContent = '👆 Изберете поне една услуга';
  // Update hint visibility when items are checked
  const origClick = (it, cell, chkBox, checked) => {
    // handled in cell click listeners above
  };
  cfBtn.addEventListener('click', () => {
    const sel = items.filter(it => checked[it.id]);
    if(!sel.length){
      clearCho();
      addBubble('Не сте избрали нищо. Можете да продължите към офертата.', 'bot');
      elInputRow.style.display = 'flex';
      setTimeout(() => renderCho([{label:'➕ Друга услуга', next:'start'},{label:'📋 Виж офертата', next:'offer_summary'}]), 300);
      return;
    }
    const { area, confirmed } = wrap._getArea();
    if(!confirmed || !area || area <= 0){
      areaSection.querySelector('input') && (areaSection.querySelector('input').style.borderColor = 'var(--red)');
      addBubble('❌ Моля, въведете или потвърдете квадратурата.', 'bot');
      return;
    }
    // Fix 44: запазваме избора за евентуален Назад
    ctx._lastGridChecked = Object.keys(checked);
    ctx._lastGridArea = area;
    clearCho();
    elInputRow.style.display = 'flex';
    addBubble(sel.map(it => it.label).join(' · ') + `  •  ${area} м²`, 'user', false);
    const paintItem = sel.find(it => it.isPaintMenu);
    const nonPaintItems = sel.filter(it => !it.isPaintMenu);
    ctx._paintAfterQueue = !!paintItem;
    ctx.queueArea = area; ctx.prevValue = area; ctx.prevUnit = 'м²';
    if(nonPaintItems.length === 0 && paintItem){
      setTimeout(() => go('painting_menu'), 380);
      return;
    }
    cbQueue = nonPaintItems.map(it => ({
      ...it,
      saveKey: it.serviceName === 'Шпакловки' ? 'putty' : it.serviceName === 'Шлайфане' ? 'sanding' : 'primer',
    }));
    processGridQueue();
  });
  wrap.appendChild(cfBtn);
  wrap.appendChild(cfHint);

  const skipBtn = document.createElement('button');
  skipBtn.className = 'cb-skip';
  skipBtn.textContent = '⏭️ Пропусни → виж офертата';
  skipBtn.style.cssText = 'margin-top:8px;font-size:13px;color:var(--muted);width:100%;';
  skipBtn.addEventListener('click', () => {
    clearCho();
    elInputRow.style.display = 'flex';
    setTimeout(() => showOfferOverlay(), 200);
  });
  wrap.appendChild(skipBtn);
  elMsgs.appendChild(wrap);
  setTimeout(() => wrap.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  choEl = wrap;
}

function processGridQueue(){
  if(!cbQueue.length){
    if(ctx._paintAfterQueue){ ctx._paintAfterQueue = false; setTimeout(() => go('painting_menu'), 380); }
    else setTimeout(() => go('offer_summary'), 380);
    return;
  }
  const item = cbQueue.shift();
  const area = ctx.queueArea || ctx.prevValue;
  const label = item.serviceName + (item.serviceType ? ` (${item.serviceType})` : '');
  addToPanel(label, area, 'м²', item.price);
  ctx.lastService = item.saveKey;
  ctx.prevValue = area; ctx.prevUnit = 'м²';
  skipScrollFor(400);
  showTyping();
  setTimeout(() => {
    hideTyping();
    setTimeout(processGridQueue, 250);
  }, 200);
}

    const seen = sessionStorage.getItem('terybot_seen');
    setTimeout(() => go(seen ? 'start' : 'before_we_start'), 270);
    if(!seen) sessionStorage.setItem('terybot_seen','1');
  }
});
elBack.addEventListener('click', goBack);
document.getElementById('tb-close').addEventListener('click', () => {
  elWidget.classList.remove('open');
  elToggle.classList.remove('open');
});

function applyViewport(){
  if(!elWidget.classList.contains('open')) return;
  const vv = window.visualViewport;
  if(!vv) return;
  const isMobile = window.innerWidth <= 600;
  if(isMobile){
    elWidget.style.height = vv.height + 'px';
    elWidget.style.top = vv.offsetTop + 'px';
    elWidget.style.bottom = 'auto';
    elWidget.style.position = 'fixed';
  }
  setTimeout(() => { const last = elMsgs.lastElementChild; if(last) last.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 50);
}
function resetViewport(){
  if(window.innerWidth <= 600){
    elWidget.style.height = '';
    elWidget.style.top = '';
    elWidget.style.bottom = '';
  }
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', () => {
    const vv = window.visualViewport;
    if(vv.height < window.innerHeight * 0.75){ applyViewport(); }
    else { resetViewport(); }
  });
}

elOfferBtn.addEventListener('click', () => showOfferOverlay());
document.getElementById('ov-back-btn').addEventListener('click', hideOfferOverlay);

document.getElementById('btn-pdf').addEventListener('click', () => {
  if(!panelItems.length){ addBubble('Няма услуги за оферта.', 'bot'); return; }
  function tryGenerate(retries){
    if(window.jspdf){
      try { generatePDF(); addBubble('✅ PDF офертата е изтеглена!', 'bot'); }
      catch(e){ addBubble('⚠️ Грешка при генериране на PDF. Моля, опитайте отново.', 'bot'); console.error(e); }
    } else if(retries > 0){
      if(!document.getElementById('jspdf-script')){
        const s = document.createElement('script'); s.id='jspdf-script';
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload = () => {
          const s2 = document.createElement('script');
          s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
          s2.onload = () => setTimeout(() => tryGenerate(retries-1), 300);
          document.head.appendChild(s2);
        };
        document.head.appendChild(s);
      } else {
        setTimeout(() => tryGenerate(retries-1), 800);
      }
      addBubble('⏳ Зареждам PDF... моля изчакайте.', 'bot');
    } else {
      addBubble('⚠️ PDF не може да се зареди. Проверете интернет връзката.', 'bot');
    }
  }
  tryGenerate(3);
});

document.getElementById('btn-viber').addEventListener('click', () => {
  const isDesktop = !/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isDesktop){
    addBubble(`💜 <strong>Viber:</strong> <span style="color:var(--gold);font-size:16px;">0877 810 418</span><br><small style="color:var(--muted)">Отворете Viber и изпратете съобщение на този номер</small>`, 'bot');
  } else {
    window.open('viber://chat?number=359877810418');
  }
});

document.getElementById('btn-new').addEventListener('click', fullReset);
document.getElementById('panel-clear').addEventListener('click', () => {
