
<!-- CALCULATOR -->
<section id="calculator">
    <div class="container">
        <h2>Калкулатор за строителни ремонти</h2>
        <p>Изберете дейности, въведете площ и вижте ориентировъчна стойност.</p>

        <div class="card" style="display:grid; gap:16px;">

            <!-- Площ -->
            <div>
                <label>Площ (м²)</label>
                <input id="areaInput" type="number" min="1" placeholder="Пример: 65"
                    style="padding: 10px; width: 100%; background: var(--bg-secondary); border: 1px solid var(--bg-secondary); color: white;">
            </div>

            <!-- Основни дейности -->
            <div>
                <label>Основни дейности</label>
                <div style="display:grid; gap:4px; font-size:14px; color:var(--text-secondary);">
                    <label><input type="checkbox" class="activity" data-key="shpaklovka"> Шпакловка и подготовка на стени</label>
                    <label><input type="checkbox" class="activity" data-key="boqdisvane"> Боядисване / латекс</label>
                    <label><input type="checkbox" class="activity" data-key="obrushtane"> Обръщане на прозорци</label>
                    <label><input type="checkbox" class="activity" data-key="gipsokarton"> Гипсокартон (тавани / предстенни обшивки)</label>
                    <label><input type="checkbox" class="activity" data-key="plochki"> Плочки / настилки</label>
                    <label><input type="checkbox" class="activity" data-key="elvik"> Ел. и ВиК работи</label>
                    <label><input type="checkbox" class="activity" data-key="banq"> Ремонт на баня</label>
                    <label><input type="checkbox" class="activity" data-key="kuhnq"> Ремонт на кухня</label>
                </div>
            </div>

            <!-- Качество -->
            <div>
                <label>Качество на материали</label>
                <select id="qualitySelect"
                    style="padding: 10px; width: 100%; background: var(--bg-secondary); border: 1px solid var(--bg-secondary); color: white;">
                    <option value="standard">Стандартно</option>
                    <option value="premium">Премиум (+25%)</option>
                    <option value="budget">Бюджетно (-15%)</option>
                </select>
            </div>

            <!-- Регион -->
            <div>
                <label>Регион</label>
                <select id="regionSelect"
                    style="padding: 10px; width: 100%; background: var(--bg-secondary); border: 1px solid var(--bg-secondary); color: white;">
                    <option value="normal">Извън София</option>
                    <option value="sofia">София / голям град (+20%)</option>
                </select>
            </div>

            <!-- Допълнителни дейности -->
            <div>
                <label>Допълнителни услуги</label>
                <div style="display:grid; gap:4px; font-size:14px; color:var(--text-secondary);">
                    <label><input type="checkbox" id="demolition"> Демонтаж / къртене (+10%)</label>
                    <label><input type="checkbox" id="waste"> Извозване на отпадъци (+5%)</label>
                    <label><input type="checkbox" id="design"> Проектиране / консултация (+8%)</label>
                </div>
            </div>

            <!-- Резерв -->
            <div>
                <label>Резерв за непредвидени разходи (%)</label>
                <input id="reserveInput" type="number" min="0" max="50" value="20"
                    style="padding: 10px; width: 100%; background: var(--bg-secondary); border: 1px solid var(--bg-secondary); color: white;">
            </div>

            <!-- Бутони -->
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
                <button onclick="calcActivities()" class="btn-primary">Изчисли</button>
                <button onclick="resetActivities()" class="btn-primary" style="background:#333; color:#fff; border:none;">
                    Изчисти
                </button>
            </div>

            <!-- Резултат -->
            <div id="resultBox" style="margin-top:10px; border-top:1px solid rgba(212,175,55,0.3); padding-top:10px;">
                <p id="resultMain" style="font-size:18px; color:var(--gold); margin-bottom:6px;"></p>
                <p id="resultDetails" style="font-size:14px; color:var(--text-secondary); white-space:pre-line;"></p>
            </div>
        </div>
    </div>
</section>

<script>
const ACTIVITY_PRICES = {
    shpaklovka: { label: "Шпакловка и подготовка", perM2: 18 },
    boqdisvane: { label: "Боядисване / латекс", perM2: 10 },
    obrushtane: { label: "Обръщане на прозорци", perM2: 25 },
    gipsokarton: { label: "Гипсокартон", perM2: 35 },
    plochki: { label: "Плочки / настилки", perM2: 40 },
    elvik: { label: "Ел. и ВиК работи", perM2: 30 },
    banq: { label: "Ремонт на баня", perM2: 120 },
    kuhnq: { label: "Ремонт на кухня", perM2: 100 }
};

function calcActivities() {
    const area = parseFloat(document.getElementById("areaInput").value);
    const quality = document.getElementById("qualitySelect").value;
    const region = document.getElementById("regionSelect").value;
    const demolition = document.getElementById("demolition").checked;
    const waste = document.getElementById("waste").checked;
    const design = document.getElementById("design").checked;
    const reservePercent = parseFloat(document.getElementById("reserveInput").value) || 0;

    const mainEl = document.getElementById("resultMain");
    const detailsEl = document.getElementById("resultDetails");

    if (!area || area <= 0) {
        mainEl.innerText = "Моля, въведете валидна площ.";
        detailsEl.innerText = "";
        return;
    }

    const activityCheckboxes = document.querySelectorAll(".activity");
    let selectedActivities = [];
    let laborBase = 0;

    activityCheckboxes.forEach(cb => {
        if (cb.checked) {
            const key = cb.getAttribute("data-key");
            const info = ACTIVITY_PRICES[key];
            if (info) {
                const price = info.perM2 * area;
                laborBase += price;
                selectedActivities.push({
                    label: info.label,
                    perM2: info.perM2,
                    total: price
                });
            }
        }
    });

    if (selectedActivities.length === 0) {
        mainEl.innerText = "Моля, изберете поне една дейност.";
        detailsEl.innerText = "";
        return;
    }

    // Качество
    let qualityCoef = 1;
    if (quality === "premium") qualityCoef = 1.25;
    if (quality === "budget") qualityCoef = 0.85;

    // Регион
    let regionCoef = region === "sofia" ? 1.20 : 1;

    // Допълнителни дейности
    let extraCoef = 1;
    if (demolition) extraCoef += 0.10;
    if (waste) extraCoef += 0.05;
    if (design) extraCoef += 0.08;

    // Прилагане на коефициенти
    laborBase = laborBase * qualityCoef * regionCoef * extraCoef;

    // Резерв
    let reserve = laborBase * (reservePercent / 100);
    let laborWithReserve = laborBase + reserve;

    // Материали (ориентировъчно)
    let materials = laborBase * 0.9;

    let total = laborWithReserve + materials;

    mainEl.innerText = "Ориентировъчна обща стойност: " + Math.round(total).toLocaleString("bg-BG") + " лв.";

    let text = "Дейности:\n";
    selectedActivities.forEach(a => {
        text += "- " + a.label + ": " + Math.round(a.total).toLocaleString("bg-BG") + " лв. (" + a.perM2 + " лв./м²)\n";
    });
    text += "\nТруд (без резерв): " + Math.round(laborBase).toLocaleString("bg-BG") + " лв.\n";
    text += "Резерв (" + reservePercent + "%): " + Math.round(reserve).toLocaleString("bg-BG") + " лв.\n";
    text += "Труд с резерв: " + Math.round(laborWithReserve).toLocaleString("bg-BG") + " лв.\n";
    text += "Материали (ориентировъчно): " + Math.round(materials).toLocaleString("bg-BG") + " лв.\n";
    text += "Цена на м² (общо): " + Math.round(total / area).toLocaleString("bg-BG") + " лв./м²";

    detailsEl.innerText = text;
}

function resetActivities() {
    document.getElementById("areaInput").value = "";
    document.getElementById("qualitySelect").value = "standard";
    document.getElementById("regionSelect").value = "normal";
    document.getElementById("reserveInput").value = 20;
    document.getElementById("demolition").checked = false;
    document.getElementById("waste").checked = false;
    document.getElementById("design").checked = false;
    document.querySelectorAll(".activity").forEach(cb => cb.checked = false);
    document.getElementById("resultMain").innerText = "";
    document.getElementById("resultDetails").innerText = "";
}
</script>
